name: Build and Deploy Telegram Bot to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  IMAGE_REPO: tsuposh-food-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-containerapp-dev
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read VERSION
        id: ver
        run: |
          test -f VERSION || (echo "VERSION file is missing" && exit 1)
          VER=$(cat VERSION | tr -d ' \n\r')
          echo "$VER" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' >/dev/null || (echo "Invalid VERSION: $VER" && exit 1)
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: ACR Login
        run: |
          az acr login -n "${ACR_NAME}"

      - name: Build image
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_REPO}"
          docker build -t "${IMAGE}:${{ steps.ver.outputs.version }}" -t "${IMAGE}:latest" .

      - name: Push image
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_REPO}"
          docker push "${IMAGE}:${{ steps.ver.outputs.version }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Container App (new revision)
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_REPO}:${{ steps.ver.outputs.version }}"
          az containerapp update \
            -g "${RESOURCE_GROUP}" \
            -n "${CONTAINER_APP_NAME}" \
            --image "${IMAGE}"